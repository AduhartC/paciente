<!-- login.html -->
<div class="login-box">
    <h2>🔐 Acceso al Sistema</h2>
    <input type="password" id="clave" placeholder="Ingresa la clave">
    <button onclick="verificar()">Entrar</button>
    <p id="error" style="color:red; display:none">Clave incorrecta</p>
</div>

<script>
function verificar() {
    const clave = document.getElementById('clave').value;
    if (clave === "clinica2024") {
        sessionStorage.setItem('autenticado', 'true');
        window.location.replace('index.html');  // ← replace en vez de href
    } else {
        document.getElementById('error').style.display = 'block';
    }
}
</script>
