<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Paciente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
    <a href="index.html">Ingreso</a>
    <a href="examenes.html">Exámenes</a>
    <a href="editar.html" class="tab-activa">Editar</a>
   <!--    <a href="consulta.html">Consulta</a> -->
    <a href="eliminar.html">Eliminar</a>
     
</div>

<div class="container" style="display:block">

    <h2>✏️ Editar Ficha Clínica</h2>

    <!-- BÚSQUEDA -->
    <div class="search-box">
        <input id="buscar" placeholder="Buscar por RUT o Nombre">
        <button id="btnBuscar">Buscar</button>
    </div>

    <!-- RESULTADOS DE BÚSQUEDA -->
    <div id="resultados"></div>

    <hr>

    <!-- FORMULARIO -->
    <form id="formEditar" class="grid-form" style="display:none">

        <div><label>Nombre</label><input id="edit-nombre"></div>
        <div><label>RUT</label><input id="edit-rut"></div>
        <div><label>Edad</label><input id="edit-edad" type="number"></div>
        <div><label>Ficha</label><input id="edit-ficha"></div>
        <div><label>Fecha nacimiento</label><input id="edit-fechaNacimiento" type="date"></div>

        <div class="full-width"><label>Diagnóstico</label><textarea id="edit-diagnostico"></textarea></div>
        <div class="full-width"><label>Cirugías Previas</label><textarea id="edit-cirugiasPrevias"></textarea></div>
        <div class="full-width"><label>Biopsias Previas</label><textarea id="edit-biopsiasPrevias"></textarea></div>
        <div class="full-width"><label>QT / RT</label><textarea id="edit-qtRtPrevia"></textarea></div>

      <div class="full-width radio-group">
        <label class="radio-label">Comité Oncológico:</label>
        <div class="options">
        <label class="radio-option"><input type="radio" name="edit-comite" value="Sí"> Sí</label>
        <label class="radio-option"><input type="radio" name="edit-comite" value="No"> No</label>
        </div>
        </div>

        <div><label>TAC</label><input type="date" id="edit-fecha-tac"></div>
        <div><label>PET CT</label><input type="date" id="edit-fecha-pet"></div>
        <div><label>RNM Cerebro</label><input type="date" id="edit-fecha-rnm"></div>

       <!-- DLCO -->
<div class="full-width examen-group">
    <label>DLCO</label>
    <div class="examen-row">
        <div>
            <label>Estado</label>
            <select id="edit-dlco">
                <option>Listo</option>
                <option>Pendiente</option>
                <option>No necesario</option>
            </select>
        </div>
        <div>
            <label>Fecha Solicitud</label>
            <input type="date" id="edit-dlco-solicitud">
        </div>
        <div>
            <label>Fecha Realizado</label>
            <input type="date" id="edit-dlco-realizado">
        </div>
    </div>
</div>

<!-- Espirometría -->
<div class="full-width examen-group">
    <label>Espirometría</label>
    <div class="examen-row">
        <div>
            <label>Estado</label>
            <select id="edit-espirometria">
                <option>Listo</option>
                <option>Pendiente</option>
                <option>No necesario</option>
            </select>
        </div>
        <div>
            <label>Fecha Solicitud</label>
            <input type="date" id="edit-espirometria-solicitud">
        </div>
        <div>
            <label>Fecha Realizado</label>
            <input type="date" id="edit-espirometria-realizado">
        </div>
    </div>
</div>

<!-- Ecocardio -->
<div class="full-width examen-group">
    <label>Ecocardio</label>
    <div class="examen-row">
        <div>
            <label>Estado</label>
            <select id="edit-ecocardio">
                <option>Listo</option>
                <option>Pendiente</option>
                <option>No necesario</option>
            </select>
        </div>
        <div>
            <label>Fecha Solicitud</label>
            <input type="date" id="edit-ecocardio-solicitud">
        </div>
        <div>
            <label>Fecha Realizado</label>
            <input type="date" id="edit-ecocardio-realizado">
        </div>
    </div>
</div>

        <div class="full-width examen-group">
    <label>Especialidad Pase Qx</label>
    <div class="examen-row">
        <div><label>Estado</label>
            <select id="ing-pase-qx">
                <option value="Listo">Listo</option>
                <option value="Pendiente" selected>Pendiente</option>
                <option value="No necesario">No necesario</option>
            </select>
        </div>
        <div><label>Fecha Solicitud</label><input type="date" id="ing-pase-qx-solicitud"></div>
        <div><label>Fecha Realizado</label><input type="date" id="ing-pase-qx-realizado"></div>
    </div>
</div>



        <div class="full-width"><label>Otros</label><textarea id="edit-otros"></textarea></div>

        <div class="full-width">
            <div id="edit-msg" class="msg-box"></div>
            <button type="submit" class="btn-primary">Guardar cambios</button>
        </div>

    </form>

</div>

<script src="editar.js?v=3"></script>
</body>
</html>
