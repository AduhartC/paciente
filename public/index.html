<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica RedSalud - Panel Médico</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f9fa; margin: 0; padding-bottom: 50px; }
        /* Barra de Menú RedSalud */
        .navbar { background-color: #004d51; display: flex; justify-content: center; padding: 12px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); sticky: top; }
        .navbar a { color: #ffffff; text-decoration: none; padding: 10px 20px; margin: 0 5px; font-weight: bold; font-size: 15px; border-radius: 4px; transition: background 0.2s; cursor: pointer; }
        .navbar a:hover, .navbar a.tab-activa { 
    background-color: #00828a !important; 
}
        
        /* Contenedores */
        .container { max-width: 750px; margin: 40px auto; background: #ffffff; padding: 35px; border-radius: 8px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid #00828a; display: none; }
        .container.tab-activa { 
    display: block !important; 
}
        h2 { color: #004d51; margin-top: 0; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        
        /* Formularios Estilizados */
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 5px; color: #4a5568; font-weight: bold; font-size: 13px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: #00b2b2; box-shadow: 0 0 0 3px rgba(0, 178, 178, 0.1); }
        textarea { resize: vertical; height: 80px; }
        
        /* Botones RedSalud */
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        button { padding: 12px 25px; border: none; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 25px; transition: background 0.2s; }
        .btn-primary { background-color: #00828a; color: white; }
        .btn-primary:hover { background-color: #00666c; }
        .btn-secondary { background-color: #e2e8f0; color: #4a5568; }
        .btn-secondary:hover { background-color: #cbd5e0; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-danger:hover { background-color: #bd2130; }
        
        /* Buscadores */
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; background: #edf2f7; padding: 15px; border-radius: 6px; }
        
        /* Alertas y Mensajes */
        .alert-sms { background-color: #fff5f5; color: #c53030; border-left: 4px solid #fc8181; padding: 12px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .msg-box { margin-top: 15px; font-weight: bold; text-align: center; }
        
        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background-color: #f7f9fa; color: #004d51; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        .row-expired { background-color: #fff5f5; }
        .badge-expired { background-color: #dc3545; color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

<!-- Menú de Navegación Superior -->
<!-- 🚨 REEMPLAZA TU MENÚ ACTUAL POR ESTE QUE SÍ TIENE LOS ID EN LAS PESTAÑAS 🚨 -->

<div class="navbar">
    <a onclick="switchTab('tab-ingreso')" id="btn-tab-ingreso" class="tab-activa">Ingreso</a>
    <a onclick="switchTab('tab-editar')" id="btn-tab-editar">Editar</a>
    <a onclick="switchTab('tab-consulta')" id="btn-tab-consulta">Consulta</a>
    <a onclick="switchTab('tab-eliminar')" id="btn-tab-eliminar">Eliminar</a>
    <a onclick="switchTab('tab-fecha')" id="btn-tab-fecha">Fecha Examen</a>
</div>



<!-- SECCIÓN 1: INGRESO -->
<div id="tab-ingreso" class="container active">
    <h2>📋 Ficha Oncológica e Historial Pre-Quirúrgico</h2>
    <form id="formIngreso" class="grid-form">
        
        <!-- Identificación Básica -->
        <div>
            <label for="ing-nombre">Nombre Paciente:</label>
            <input type="text" id="ing-nombre" placeholder="Juan Pérez" required>
        </div>
        <div>
            <label for="ing-rut">RUT:</label>
            <input type="text" id="ing-rut" placeholder="12345678-9" required>
        </div>
        <div>
            <label for="ing-edad">Edad:</label>
            <input type="number" id="ing-edad" min="0" max="120" placeholder="65" required>
        </div>
        <div>
            <label for="ing-ficha">N° Ficha Clínica:</label>
            <input type="text" id="ing-ficha" placeholder="FC-99824" required>
        </div>
        <div>
            <label for="ing-fecha-nacimiento">Fecha de Nacimiento:</label>
            <input type="date" id="ing-fecha-nacimiento" required>
        </div>
        <div>
            <label for="ing-fecha-ingreso">Fecha de Registro:</label>
            <input type="date" id="ing-fecha-ingreso" required>
        </div>

        <!-- Historial Diagnóstico y Tratamiento -->
        <div class="full-width">
            <label for="ing-diagnostico">Diagnóstico Principal:</label>
            <textarea id="ing-diagnostico" placeholder="Adenocarcinoma de pulmón estadio III..." required></textarea>
        </div>
        <div class="full-width">
            <label for="ing-cirugias">Cirugías Previas:</label>
            <textarea id="ing-cirugias" placeholder="Laparoscopía exploratoria (2022), Apendicectomía (2015)..."></textarea>
        </div>
        <div class="full-width">
            <label for="ing-biopsias">Biopsias Previas:</label>
            <textarea id="ing-biopsias" placeholder="Biopsia core ganglionar (Marzo 2026): Positiva para malignidad..."></textarea>
        </div>
        <div class="full-width">
            <label for="ing-qt-rt">Qt o Rt Previa (Ciclos y Fechas):</label>
            <textarea id="ing-qt-rt" placeholder="4 Ciclos Cisplatino/Pemetrexed finalizados en Enero 2026. 25 sesiones de Rt..."></textarea>
        </div>

        <!-- Evaluación de Comité -->
        <div class="full-width radio-group">
            <label>Presentado a Comité Oncológico:</label>
            <div class="options">
                <label><input type="radio" name="ing-comite" value="Sí" required> Sí</label>
                <label><input type="radio" name="ing-comite" value="No"> No</label>
            </div>
        </div>

        <!-- Seguimiento Imagenológico -->
        <div>
            <label for="ing-fecha-tac">Último TAC (Fecha):</label>
            <input type="date" id="ing-fecha-tac">
        </div>
        <div>
            <label for="ing-fecha-pet">Último PET CT (Fecha):</label>
            <input type="date" id="ing-fecha-pet">
        </div>
        <div class="full-width">
            <label for="ing-fecha-rnm">Última RNM Cerebro (Fecha):</label>
            <input type="date" id="ing-fecha-rnm">
        </div>

        <!-- Pruebas Funcionales Fisiológicas -->
        <div>
            <label for="ing-dlco">DLCO:</label>
            <select id="ing-dlco" required>
                <option value="Listo">Listo</option>
                <option value="Pendiente">Pendiente</option>
                <option value="No necesario">No necesario</option>
            </select>
        </div>
        <div>
            <label for="ing-espirometria">Espirometría:</label>
            <select id="ing-espirometria" required>
                <option value="Listo">Listo</option>
                <option value="Pendiente">Pendiente</option>
                <option value="No necesario">No necesario</option>
            </select>
        </div>
        <div class="full-width">
            <label for="ing-ecocardio">Ecocardio:</label>
            <select id="ing-ecocardio" required>
                <option value="Listo">Listo</option>
                <option value="Pendiente">Pendiente</option>
                <option value="No necesario">No necesario</option>
            </select>
        </div>

        <!-- Requerimientos Quirúrgicos y Adicionales -->
        <div class="full-width">
            <label for="ing-pase-qx">¿De qué especialidad requiere pase Qx? (Sólo si es necesario):</label>
            <input type="text" id="ing-pase-qx" placeholder="Cardiología, Neumología, etc.">
        </div>
        <div class="full-width">
            <label for="ing-otros">Otros Antecedentes / Observaciones:</label>
            <textarea id="ing-otros" placeholder="Alergias medicamentosas, soporte familiar, observaciones logísticas..."></textarea>
        </div>

        <!-- Envío -->
        <div class="full-width">
            <button type="submit" class="btn-primary">Registrar Ficha Oncológica</button>
        </div>
    </form>
    <div id="ing-msg" class="msg-box"></div>
</div>
