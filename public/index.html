<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso Paciente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
    <a href="index.html" class="tab-activa">Ingreso</a>
    <a href="editar.html">Editar</a>
    <a href="consulta.html">Consulta</a>
    <a href="eliminar.html">Eliminar</a>
</div>

<div class="container" style="display:block">

    <h2>📋 Ficha Oncológica e Historial Pre-Quirúrgico</h2>

    <form id="formIngreso" class="grid-form">

        <div><label>Nombre Paciente:</label><input type="text" id="ing-nombre" required></div>
        <div><label>RUT:</label><input type="text" id="ing-rut" required></div>
        <div><label>Edad:</label><input type="number" id="ing-edad" min="0" max="120" required></div>
        <div><label>N° Ficha Clínica:</label><input type="text" id="ing-ficha" required></div>
        <div><label>Fecha de Nacimiento:</label><input type="date" id="ing-fecha-nacimiento" required></div>
        <div><label>Fecha de Registro:</label><input type="date" id="ing-fecha-ingreso" required></div>

        <div class="full-width"><label>Diagnóstico Principal:</label><textarea id="ing-diagnostico" required></textarea></div>
        <div class="full-width"><label>Cirugías Previas:</label><textarea id="ing-cirugias"></textarea></div>
        <div class="full-width"><label>Biopsias Previas:</label><textarea id="ing-biopsias"></textarea></div>
        <div class="full-width"><label>Qt o Rt Previa:</label><textarea id="ing-qt-rt"></textarea></div>

        <div class="full-width">
            <label>Presentado a Comité Oncológico:</label>
            <div class="options">
                <label><input type="radio" name="ing-comite" value="Sí" required> Sí</label>
                <label><input type="radio" name="ing-comite" value="No"> No</label>
            </div>
        </div>

        <div><label>Último TAC:</label><input type="date" id="ing-fecha-tac"></div>
        <div><label>Último PET CT:</label><input type="date" id="ing-fecha-pet"></div>
        <div class="full-width"><label>Última RNM Cerebro:</label><input type="date" id="ing-fecha-rnm"></div>

        <div><label>DLCO:</label>
            <select id="ing-dlco">
                <option value="Listo">Listo</option>
                <option value="Pendiente" selected>Pendiente</option>
                <option value="No necesario">No necesario</option>
            </select>
        </div>
        <div><label>Espirometría:</label>
            <select id="ing-espirometria">
                <option value="Listo">Listo</option>
                <option value="Pendiente" selected>Pendiente</option>
                <option value="No necesario">No necesario</option>
            </select>
        </div>
        <div class="full-width"><label>Ecocardio:</label>
            <select id="ing-ecocardio">
                <option value="Listo">Listo</option>
                <option value="Pendiente" selected>Pendiente</option>
                <option value="No necesario">No necesario</option>
            </select>
        </div>

        <div class="full-width"><label>Especialidad Pase Qx:</label><input type="text" id="ing-pase-qx"></div>
        <div class="full-width"><label>Otros / Observaciones:</label><textarea id="ing-otros"></textarea></div>

        <div class="full-width">
            <button type="submit" class="btn-primary">Registrar Ficha Oncológica</button>
        </div>

    </form>

    <div id="ing-msg" class="msg-box"></div>

</div>

<script src="app.js"></script>
</body>
</html>
