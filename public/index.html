<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Pacientes Oncológicos</title>
    <!-- Vinculación del archivo CSS externo -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Menú de Pestañas Navigation -->
    <div class="navbar">
        <a onclick="switchTab('tab-ingreso')" id="btn-tab-ingreso" class="tab-activa">Ingreso</a>
        <a onclick="switchTab('tab-editar')" id="btn-tab-editar">Editar</a>
        <a onclick="switchTab('tab-consulta')" id="btn-tab-consulta">Consulta</a>
        <a onclick="switchTab('tab-eliminar')" id="btn-tab-eliminar">Eliminar</a>
        <a onclick="switchTab('tab-fecha')" id="btn-tab-fecha">Fecha Examen</a>
    </div>

    <!-- SECCIÓN 1: INGRESO -->
    <div id="tab-ingreso" class="container">
        <h2>📋 Ficha Oncológica e Historial Pre-Quirúrgico</h2>
        <form id="formIngreso" class="grid-form">
            
            <!-- Identificación Básica -->
            <div>
                <label>Nombre Paciente:</label>
                <input type="text" id="ing-nombre" placeholder="Juan Pérez" required>
            </div>
            <div>
                <label>RUT:</label>
                <input type="text" id="ing-rut" placeholder="12345678-9" required>
            </div>
            <div>
                <label>Edad:</label>
                <input type="number" id="ing-edad" min="0" max="120" placeholder="65" required>
            </div>
            <div>
                <label>N° Ficha Clínica:</label>
                <input type="text" id="ing-ficha" placeholder="FC-99824" required>
            </div>
            <div>
                <label>Fecha de Nacimiento:</label>
                <input type="date" id="ing-fecha-nacimiento" required>
            </div>
            <div>
                <label>Fecha de Registro:</label>
                <input type="date" id="ing-fecha-ingreso" required>
            </div>

            <!-- Historial Diagnóstico y Tratamiento -->
            <div class="full-width">
                <label>Diagnóstico Principal:</label>
                <textarea id="ing-diagnostico" placeholder="Adenocarcinoma de pulmón estadio III..." required></textarea>
            </div>
            <div class="full-width">
                <label>Cirugías Previas:</label>
                <textarea id="ing-cirugias" placeholder="Laparoscopía exploratoria (2022)..."></textarea>
            </div>
            <div class="full-width">
                <label>Biopsias Previas:</label>
                <textarea id="ing-biopsias" placeholder="Biopsia core ganglionar..."></textarea>
            </div>
            <div class="full-width">
                <label>Qt o Rt Previa (Ciclos y Fechas):</label>
                <textarea id="ing-qt-rt" placeholder="4 Ciclos Cisplatino finalizados en Enero 2026..."></textarea>
            </div>

            <!-- Evaluación de Comité -->
            <div class="full-width radio-group">
                <label>Presentado a Comité Oncológico:</label>
                <div class="options">
                    <label><input type="radio" name="ing-comite" value="Sí" required> Sí</label>
                    <label><input type="radio" name="ing-comite" value="No"> No</label>
                </div>
            </div>

            <!-- Seguimiento Imagenológico -->
            <div>
                <label>Último TAC (Fecha):</label>
                <input type="date" id="ing-fecha-tac">
            </div>
            <div>
                <label>Último PET CT (Fecha):</label>
                <input type="date" id="ing-fecha-pet">
            </div>
            <div class="full-width">
                <label>Última RNM Cerebro (Fecha):</label>
                <input type="date" id="ing-fecha-rnm">
            </div>

            <!-- Pruebas Funcionales Fisiológicas -->
            <div>
                <label>DLCO:</label>
                <select id="ing-dlco" required>
                    <option value="Listo">Listo</option>
                    <option value="Pendiente" selected>Pendiente</option>
                    <option value="No necesario">No necesario</option>
                </select>
            </div>
            <div>
                <label>Espirometría:</label>
                <select id="ing-espirometria" required>
                    <option value="Listo">Listo</option>
                    <option value="Pendiente" selected>Pendiente</option>
                    <option value="No necesario">No necesario</option>
                </select>
            </div>
            <div class="full-width">
                <label>Ecocardio:</label>
                <select id="ing-ecocardio" required>
                    <option value="Listo">Listo</option>
                    <option value="Pendiente" selected>Pendiente</option>
                    <option value="No necesario">No necesario</option>
                </select>
            </div>

            <!-- Requerimientos Quirúrgicos y Adicionales -->
            <div class="full-width">
                <label>¿De qué especialidad requiere pase Qx? (Sólo si es necesario):</label>
                <input type="text" id="ing-pase-qx" placeholder="Cardiología, Neumología, etc.">
            </div>
            <div class="full-width">
                <label>Otros Antecedentes / Observaciones:</label>
                <textarea id="ing-otros" placeholder="Alergias medicamentosas, soporte familiar..."></textarea>
            </div>

            <!-- Envío -->
            <div class="full-width">
                <button type="submit" class="btn-primary">Registrar Ficha Oncológica</button>
            </div>
        </form>
        
        <!-- Contenedor dinámico de respuestas de red -->
        <div id="ing-msg" class="msg-box"></div>
    </div>

    <!-- Scripts de Control -->
    <script>
        // Función básica para alternar la visualización de pestañas en el frontend
        function switchTab(tabId) {
            // Ocultar todos los contenedores con clase container
            document.querySelectorAll('.container').forEach(el => el.style.display = 'none');
            // Remover estado activo de los botones de navegación
            document.querySelectorAll('.navbar a').forEach(el => el.classList.remove('tab-activa'));
            
            // Mostrar la pestaña seleccionada
            const target = document.getElementById(tabId);
            if(target) target.style.display = 'block';
            
            // Iluminar el botón activo
            const btn = document.getElementById('btn-' + tabId);
            if(btn) btn.classList.add('tab-activa');
        }
        
        // Inicializar mostrando la primera pestaña por defecto al cargar la página
        switchTab('tab-ingreso');
    </script>
    <script src="app.js"></script>
</body>
</html>
